[variables]
NODE_ENV = "production"
BASE_PATH = "/"

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm install -g pnpm@9",
  "cd /app && pnpm install --frozen-lockfile"
]

[phases.build]
cmds = ["cd /app && pnpm --filter @workspace/subpay run build"]

[start]
cmd = "cd /app && pnpm --filter @workspace/subpay run serve"
